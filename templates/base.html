<!DOCTYPE html>
<html lang="{{ page.lang | default('zh') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default(site.title) }}</title>
    <meta name="description" content="{{ page.description | default(site.description) }}">

    <link rel="stylesheet" href="/assets/css/style.css">

    <!-- SEO / social meta -->
    <meta name="generator" content="guushu-build" />
    <meta property="og:title" content="{{ page.title | default(site.title) }}" />
    <meta property="og:locale" content="{{ page.lang | default('zh') }}" />
    <meta property="og:description" content="{{ page.description | default(site.description) }}" />
    <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
    <meta property="og:site_name" content="{{ site.title }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{ page.title | default(site.title) }}" />
    <meta name="twitter:description" content="{{ page.description | default(site.description) }}" />
    <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

    <link type="application/atom+xml" rel="alternate" href="{{ site.url }}/feed.xml" title="{{ site.title }}" />

    <!-- Language Detection Script -->
    <script>
        // Auto language detection and redirect
        (function() {
            const savedLang = '{{ page.lang if page.lang_explicit else "" }}'
            const browserLang = navigator.language || navigator.userLanguage;
            const primaryLang = browserLang.split('-')[0].toLowerCase();

            let targetLang = savedLang || (primaryLang === 'en' ? 'en' : 'zh');

            const currentPath = window.location.pathname;
            const isEnglishPage = currentPath.startsWith('/en/');
            const isRootPage = currentPath === '/' || currentPath === '/index.html';

            // Only redirect on first visit or language preference change
            if (targetLang === 'en' && !isEnglishPage && !isRootPage && !savedLang) {
                window.location.href = '/en' + currentPath;
            } else if (targetLang === 'zh' && isEnglishPage && !savedLang) {
                window.location.href = currentPath.replace('/en/', '/');
            }
        })();
    </script>
</head>
<body>
<!-- Language Switcher -->
<div class="language-switcher">
    {% if page.lang == 'zh' %}
    <a href="/en{{ page.url }}" class="lang-link">English</a>
    {% else %}
    <a href="{{ page.url | replace('/en', '') }}" class="lang-link">中文</a>
    {% endif %}
</div>

<!-- Header -->
{% include "partials/header.html" %}

<!-- Main Content -->
<main>
{% block content %}{% endblock %}
</main>

<!-- Footer -->
{% include "partials/footer.html" %}

<!-- Scripts -->
<script src="/assets/js/template-engine.js"></script>
<script src="/assets/js/main.js"></script>
<script src="/assets/js/components.js"></script>
</body>
</html>
