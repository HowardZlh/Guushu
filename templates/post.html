{% extends "base.html" %}
{% block content %}
<article class="post">
    <div class="container">
        <div class="post-header">
            <h1 class="post-title">{{ page.title }}</h1>
            <time class="post-date">{{ page.date_display }}</time>
            {% if page.author %}
            <span class="post-author">by {{ page.author }}</span>
            {% endif %}
        </div>

        <div class="post-content">
            {{ page.content }}
        </div>

        {% if page.tags %}
        <div class="post-tags">
            {% for tag in page.tags %}
            <span class="tag">{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</article>
{% endblock %}
